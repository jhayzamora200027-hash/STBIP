<IfModule mod_headers.c>
    # Prevent Clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"

    # Prevent MIME Sniffing
    Header always set X-Content-Type-Options "nosniff"

    # Referrer policy
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # HSTS (only when serving over HTTPS)
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains" env=HTTPS

    # Content Security Policy (adjust to remove 'unsafe-inline' where possible)
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' https:; style-src 'self' https:; img-src 'self' data: https:; font-src 'self' https: data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"

    # Permissions/Feature Policy
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"

    # Cross-origin isolation
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Embedder-Policy "require-corp"
    Header always set Cross-Origin-Resource-Policy "same-origin"

    # Disallow Adobe cross-domain policies
    Header always set X-Permitted-Cross-Domain-Policies "none"

    # Legacy XSS protection (optional)
    Header always set X-XSS-Protection "1; mode=block"
</IfModule>

# To enable: include this file in your Apache site conf or virtualhost and ensure mod_headers is enabled.
# Example: 
#   Include /path/to/stbip/docs/security/apache-security-headers.conf
